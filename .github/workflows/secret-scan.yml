name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned)
        env:
          GITLEAKS_VERSION: "8.24.2"
        run: |
          set -euo pipefail
          url="$(curl -fsSL "https://api.github.com/repos/gitleaks/gitleaks/releases/tags/v${GITLEAKS_VERSION}" \
                | jq -r '.assets[] | select(.name | test("linux_x64\\.tar\\.gz$")) | .browser_download_url' || true)"
          if [ -z "${url:-}" ] || [ "$url" = "null" ]; then
            url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          fi
          echo "Downloading: $url"
          curl -fsSL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
      - name: Scan full git history
        run: |
          set -euo pipefail
          ./gitleaks git . --config .gitleaks.toml --redact --no-banner --exit-code 1

  no-sensitive-files:
    name: no sensitive paths tracked
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refuse to track sensitive paths
        run: |
          set -euo pipefail
          pattern='(^|/)references/|(^|/)memory/|\.env$|tenant-cache|\.token-cache|_posted_.*\.jsonl$|posted-vouchers\.jsonl$|accounts-created\.jsonl$|facit_.*\.csv$|\.prod-approved$'
          bad="$(git ls-files | grep -E "$pattern" || true)"
          if [ -n "$bad" ]; then
            echo "::error::These sensitive files must not be tracked:"
            echo "$bad"
            exit 1
          fi
          echo "OK: no sensitive paths tracked."
